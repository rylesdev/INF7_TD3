        tenant_4: Organise household chores with your flatmates
        tenant_5: Contact your landlord via the integrated messaging
        tenant_btn_space: My space
        tenant_btn_listings: Browse listings
        tenant_btn_find: Find a flatshare
    owners:
        title: Top-rated landlords
        role: Landlord
        reviews: reviews
    listings:
        title: Recent listings
        btn_detail: View details
        btn_all: All listings
        per_month: "€ / month"
    faq:
        title: Frequently asked questions
        guest_q1: Is registration free?
        guest_a1: "Yes, registration is completely free for both tenants and landlords. Create your account in a few minutes and access all features with no commitment."
        guest_q2: What is the difference between a tenant and landlord account?
        guest_a2: "A tenant account lets you apply for listings, view your rents and receipts, and contact your landlord. A landlord account lets you manage your flatshares, post listings, track rents and process applications."
        guest_q3: How do I find a flatshare?
        guest_a3: "Go to the Listings section. You can filter by city and budget. Click a listing to see the details and the landlord's profile, then apply directly online."
        guest_q4: Is my personal data secure?
        guest_a4: "Yes. Passwords are encrypted and never stored in plain text. Attachments are only accessible to the relevant parties. All communications are transmitted securely."
        guest_q5: Can I have multiple flatmates in the same apartment?
        guest_a5: "Yes, the platform is designed for flatsharing. Each tenant has their own personal space and charges are automatically split between rooms according to their surface area."
        guest_q6: How do I report a problem in the property?
        guest_a6: "Use the integrated messaging to notify your landlord (leak, breakdown...). Your messages are timestamped, providing a useful written record in case of a dispute."
        owner_q1: How do I post a listing?
        owner_a1: "From your dashboard, click Listings then New listing. Fill in the title, description, price and add photos. The listing will be visible immediately on the platform."
        owner_q2: How do I accept or reject an application?
        owner_a2: "In the Applications menu, you can see all received applications with their supporting documents. Click Accept to choose the room to assign to the tenant, or Reject to send an automatic rejection message."
        owner_q3: How do I manage unpaid rents?
        owner_a3: "In the Rents section, overdue rents appear in red. You can contact the tenant via the integrated messaging or manually mark a rent as paid from its details."
        owner_q4: How do I split charges between flatmates?
        owner_a4: "Create a charge (electricity, internet...) from the Charges section. Shares are automatically calculated based on each room's surface area. Each tenant sees their share from their space."
        owner_q5: How do I generate a rent receipt?
        owner_a5: "When a rent is marked as paid, the receipt is generated automatically. Your tenant can download it from their space. You can also generate it manually from the rent list."
        owner_q6: How do I review a tenant?
        owner_a6: "In the Reviews section, click Review next to the relevant tenant. Give a rating from 1 to 5 and add a comment. This review will be visible on the tenant's public profile."
        tenant_q1: How do I apply for a listing?
        tenant_a1: "On an available listing's page, click Apply. You will need to attach a proof of identity and proof of income. The landlord will receive your application and reply via messaging."
        tenant_q2: How do I contact my landlord?
        tenant_a2: "Go to the Messaging section of your tenant space. You can send messages and view the full history of your exchange. Press Enter to send (Shift+Enter for a line break)."
        tenant_q3: How do I get my rent receipt?
        tenant_a3: "In the Receipts section, you will find all your available receipts. Click Download PDF to get your document, useful for housing benefit or rehousing applications."
        tenant_q4: My rent shows as unpaid but I have paid it, what should I do?
        tenant_a4: "If your payment is not reflected, use the Pay button from your Rents section to record the payment. A receipt will be generated automatically and your landlord will be notified."
        tenant_q5: How do I end my tenancy?
        tenant_a5: "In your tenant space, click End my tenancy (accessible from the dashboard). Confirm the action and your landlord will be automatically notified."
        tenant_q6: How do I review my landlord?
        tenant_a6: "In the Reviews section, click Review my landlord if you have paid at least one rent. Give a rating and a comment. You can also access their public profile from a listing to leave your review."

