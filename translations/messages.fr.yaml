        tenant_btn_space: Mon espace
        tenant_btn_listings: Voir les annonces
        tenant_btn_find: Trouver une colocation
    owners:
        title: "Propriétaires bien notés"
        role: "Propriétaire"
        reviews: avis
    listings:
        title: Annonces récentes
        btn_detail: Voir le détail
        btn_all: Toutes les annonces
        per_month: "€ / mois"
    faq:
        title: Questions fréquentes
        guest_q1: "Est-ce gratuit de s'inscrire ?"
        guest_a1: "Oui, l'inscription est entièrement gratuite pour les locataires comme pour les propriétaires. Créez votre compte en quelques minutes et accédez à toutes les fonctionnalités sans engagement."
        guest_q2: "Quelle est la différence entre un compte locataire et propriétaire ?"
        guest_a2: "Un compte locataire vous permet de candidater à des annonces, consulter vos loyers et quittances, et contacter votre propriétaire. Un compte propriétaire vous permet de gérer vos colocations, publier des annonces, suivre les loyers et traiter les candidatures."
        guest_q3: Comment trouver une colocation ?
        guest_a3: "Rendez-vous dans la rubrique \"Annonces\". Vous pouvez filtrer par ville et par budget. Cliquez sur une annonce pour voir les détails et le profil du propriétaire, puis candidatez directement en ligne."
        guest_q4: "Mes données personnelles sont-elles sécurisées ?"
        guest_a4: "Oui. Les mots de passe sont chiffrés et jamais stockés en clair. Les pièces jointes ne sont accessibles qu'aux parties concernées. Toutes les communications transitent de manière sécurisée."
        guest_q5: "Puis-je avoir plusieurs colocataires dans le même logement ?"
        guest_a5: "Oui, la plateforme est conçue pour la colocation. Chaque locataire a son propre espace personnel et les charges sont automatiquement réparties entre les chambres selon leur surface."
        guest_q6: Comment signaler un problème dans le logement ?
        guest_a6: "Utilisez la messagerie intégrée pour informer votre propriétaire (fuite, panne...). Vos messages sont horodatés, ce qui constitue une trace écrite utile en cas de litige."
        owner_q1: Comment publier une annonce ?
        owner_a1: "Depuis votre tableau de bord, cliquez sur \"Annonces\" puis \"Nouvelle annonce\". Renseignez le titre, la description, le prix et ajoutez des photos. L'annonce sera visible immédiatement sur la plateforme."
        owner_q2: Comment accepter ou refuser une candidature ?
        owner_a2: "Dans le menu \"Candidatures\", vous voyez toutes les candidatures reçues avec les pièces justificatives. Cliquez sur \"Accepter\" pour choisir la chambre à attribuer au locataire, ou sur \"Refuser\" pour lui envoyer un message automatique de refus."
        owner_q3: Comment gérer les loyers impayés ?
        owner_a3: "Dans la rubrique \"Loyers\", les loyers en retard apparaissent en rouge. Vous pouvez contacter le locataire concerné via la messagerie intégrée ou marquer manuellement un loyer comme payé depuis son détail."
        owner_q4: Comment répartir les charges entre les colocataires ?
        owner_a4: "Créez une charge (électricité, internet...) depuis la rubrique \"Charges\". Les tantièmes sont calculés automatiquement selon la surface de chaque chambre. Chaque locataire voit sa part depuis son espace."
        owner_q5: Comment générer une quittance de loyer ?
        owner_a5: "Lorsqu'un loyer est marqué comme payé, la quittance est générée automatiquement. Votre locataire peut la télécharger depuis son espace. Vous pouvez aussi la générer manuellement depuis la liste des loyers."
        owner_q6: Comment évaluer un locataire ?
        owner_a6: "Dans la rubrique \"Evaluations\", cliquez sur \"Evaluer\" en face du locataire concerné. Attribuez une note de 1 à 5 et ajoutez un commentaire. Cette évaluation sera visible sur le profil public du locataire."
        tenant_q1: Comment candidater à une annonce ?
        tenant_a1: "Sur la page d'une annonce disponible, cliquez sur \"Candidater\". Vous devrez joindre une pièce d'identité et un justificatif de revenus. Le propriétaire recevra votre dossier et vous répondra via la messagerie."
        tenant_q2: Comment contacter mon propriétaire ?
        tenant_a2: "Rendez-vous dans la rubrique \"Messagerie\" de votre espace locataire. Vous pouvez y envoyer des messages et consulter l'historique complet de votre échange. Appuyez sur Entrée pour envoyer."
        tenant_q3: Comment obtenir ma quittance de loyer ?
        tenant_a3: "Dans la rubrique \"Quittances\", vous trouverez toutes vos quittances disponibles. Cliquez sur \"Télécharger PDF\" pour obtenir votre justificatif, utile pour vos dossiers APL ou de relogement."
        tenant_q4: "Mon loyer est marqué impayé alors que je l'ai réglé, que faire ?"
        tenant_a4: "Si votre paiement n'est pas reflété, utilisez le bouton \"Payer\" depuis votre rubrique \"Loyers\" pour simuler le paiement en ligne. Une quittance sera générée automatiquement."
        tenant_q5: Comment résilier mon bail ?
        tenant_a5: "Dans votre espace locataire, cliquez sur \"Résilier mon bail\" (accessible depuis le tableau de bord). Confirmez l'action et votre propriétaire en sera informé automatiquement."
        tenant_q6: Comment évaluer mon propriétaire ?
        tenant_a6: "Dans la rubrique \"Evaluations\", cliquez sur \"Evaluer mon propriétaire\" si vous avez payé au moins un loyer. Attribuez une note et un commentaire. Vous pouvez aussi accéder à son profil public depuis une annonce."

