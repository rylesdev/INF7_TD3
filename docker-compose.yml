services:
  app:
    build: .
    ports:
      - "8080:80"
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: mysql://coloc:coloc@db:3306/colocation_db?serverVersion=8.0&charset=utf8mb4
      MAILER_DSN: null://null
      CORS_ALLOW_ORIGIN: "^https?://(localhost|127\\.0\\.0\\.1)(:[0-9]+)?$$"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/var/www/html/public/uploads
      - jwt_keys:/var/www/html/config/jwt

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: colocation_db
      MYSQL_USER: coloc
      MYSQL_PASSWORD: coloc
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ucoloc", "-pcoloc"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  uploads:
  jwt_keys:
